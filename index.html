<body class="bg-slate-50">

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 內建 SVG 圖示庫 ---
        const Icon = ({ name, size = 24, className = "", color = "currentColor" }) => {
            const icons = {
                Wallet: <><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></>,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
                Tags: <><path d="M9 5H2v7l6.29 6.29c.94.94 2.48.94 3.42 0l3.58-3.58c.94-.94.94-2.48 0-3.42L9 5Z" /><path d="M6 9.01V9" /><path d="m15 5 6.3 6.3a2.4 2.4 0 0 1 0 3.4L17 19" /></>,
                DollarSign: <><line x1="12" x2="12" y1="2" y2="22" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></>,
                PiggyBank: <><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2h2v-4h-2c0-1-.5-1.5-1-2h0V5z" /><path d="M2 9v1c0 1.1.9 2 2 2h1" /><path d="M16 11h.01" /></>,
                Send: <><line x1="22" x2="11" y1="2" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></>,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></>,
                BarChart: <><line x1="12" x2="12" y1="20" y2="10" /><line x1="18" x2="18" y1="20" y2="4" /><line x1="6" x2="6" y1="20" y2="16" /></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
                RefreshCw: <><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" /></>,
                ShoppingCart: <><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" /></>,
                FileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><polyline points="10 9 9 9 8 9" /></>,
                X: <><line x1="18" x2="6" y1="6" y2="18" /><line x1="6" x2="18" y1="6" y2="18" /></>,
                Trash: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></>,
                Landmark: <><line x1="3" x2="21" y1="22" y2="22" /><line x1="6" x2="6" y1="18" y2="11" /><line x1="10" x2="10" y1="18" y2="11" /><line x1="14" x2="14" y1="18" y2="11" /><line x1="18" x2="18" y1="18" y2="11" /><polygon points="12 2 20 7 4 7" /></>,
                PieChartIcon: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></>

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 自由年月選擇器 (不限制選項，用於新增紀錄) ---
        const FreeMonthYearPicker = ({ value, onChange }) => {
            const [selectedYear, selectedMonth] = (value || '2024-01').split('-');
            
            const currentYear = new Date().getFullYear();
            const availableYears = [];
            // 提供前後各3年的選擇範圍
            for (let i = currentYear - 3; i <= currentYear + 3; i++) {
                availableYears.push(i.toString());
            }
            if (!availableYears.includes(selectedYear)) {
                availableYears.push(selectedYear);
            }
            availableYears.sort((a, b) => b.localeCompare(a)); // 降冪排序

            const availableMonths = Array.from({length: 12}, (_, i) => String(i + 1).padStart(2, '0'));

            return (
                <div className="flex items-center justify-center bg-white border border-slate-200 rounded-lg px-2 sm:px-3 py-1.5 sm:py-2 shadow-sm shrink-0 min-w-0">
                    <select 
                        value={selectedYear} 
                        onChange={(e) => onChange(`${e.target.value}-${selectedMonth}`)} 
                        className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer text-center text-sm sm:text-base appearance-none min-w-0 px-1"
                    >
                        {availableYears.map(y => <option key={y} value={y}>{y}年</option>)}
                    </select>
                    <span className="text-slate-300 font-light text-sm sm:text-base shrink-0">/</span>
                    <select 
                        value={selectedMonth} 
                        onChange={(e) => onChange(`${selectedYear}-${e.target.value}`)} 
                        className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer text-center text-sm sm:text-base appearance-none min-w-0 px-1"
                    >
                        {availableMonths.map(m => <option key={m} value={m}>{m}月</option>)}
                    </select>
                </div>
            );
        };

        // --- 智慧型年月選擇器 (限制選項，用於報表篩選) ---
        const MonthYearPicker = ({ value, onChange, availableYearMonths }) => {
            const [selectedYear, selectedMonth] = value.split('-');

            // 取出所有可選的「年份」並降冪排序
            const availableYears = Array.from(new Set(availableYearMonths.map(ym => ym.split('-')[0]))).sort((a, b) => b.localeCompare(a));
            if (!availableYears.includes(selectedYear)) {
                availableYears.push(selectedYear);
                availableYears.sort((a, b) => b.localeCompare(a));
            }

            // 根據選中的年份，過濾出該年有資料的「月份」並升冪排序
            const availableMonthsForYear = availableYearMonths
                .filter(ym => ym.startsWith(selectedYear))
                .map(ym => ym.split('-')[1])
                .sort((a, b) => a.localeCompare(b));
                
            if (!availableMonthsForYear.includes(selectedMonth)) {
                availableMonthsForYear.push(selectedMonth);
                availableMonthsForYear.sort((a, b) => a.localeCompare(b));
            }

            return (
                <div className="flex items-center justify-center bg-white border border-slate-200 rounded-lg px-2 sm:px-3 py-1.5 sm:py-2 shadow-sm shrink-0 min-w-0">
                    <select 
                        value={selectedYear} 
                        onChange={(e) => {
                            const newYear = e.target.value;
                            // 切換年份時，自動選擇該年份中最新或第一個可選的月份，防呆
                            const monthsForNewYear = availableYearMonths.filter(ym => ym.startsWith(newYear)).map(ym => ym.split('-')[1]).sort((a, b) => b.localeCompare(a));
                            const newMonth = monthsForNewYear.includes(selectedMonth) ? selectedMonth : (monthsForNewYear[0] || '01');
                            onChange(`${newYear}-${newMonth}`);
                        }} 
                        className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer text-center text-sm sm:text-base appearance-none min-w-0 px-1"
                    >
                        {availableYears.map(y => <option key={y} value={y}>{y}年</option>)}
                    </select>
                    <span className="text-slate-300 font-light text-sm sm:text-base shrink-0">/</span>
                    <select 
                        value={selectedMonth} 
                        onChange={(e) => onChange(`${selectedYear}-${e.target.value}`)} 
                        className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer text-center text-sm sm:text-base appearance-none min-w-0 px-1"
                    >
                        {availableMonthsForYear.map(m => <option key={m} value={m}>{m}月</option>)}
                    </select>
                </div>
            );
        };

        // --- SVG 圓餅圖組件 ---
        const PieChart = ({ data }) => {
            const [tooltip, setTooltip] = useState({ show: false, x: 0, y: 0, name: '', value: 0, percent: '' });
            const total = data.reduce((sum, d) => sum + d.value, 0);
            if (total === 0) return <div className="text-center py-10 text-slate-400 text-xl font-bold">該期間無支出資料</div>;

            const handleMouseMove = (e, slice, displayPercent) => {
                setTooltip({ show: true, x: e.clientX, y: e.clientY, name: slice.name, value: slice.value, percent: displayPercent });
            };
            const handleMouseLeave = () => setTooltip(prev => ({ ...prev, show: false }));

            let cumulativeAngle = -Math.PI / 2;
            const slicesData = data.map((slice) => {
                const angle = (slice.value / total) * Math.PI * 2;
                const percentNum = (slice.value / total) * 100;
                const percent = Math.round(percentNum);
                const displayPercent = percent === 0 && slice.value > 0 ? '<1%' : `${percent}%`;
                
                const midAngle = cumulativeAngle + angle / 2;
                const isRight = Math.cos(midAngle) >= -0.01; 
                
                const x1 = Math.cos(cumulativeAngle);
                const y1 = Math.sin(cumulativeAngle);
                cumulativeAngle += angle;
                const x2 = Math.cos(cumulativeAngle);
                const y2 = Math.sin(cumulativeAngle);
                const largeArcFlag = angle > Math.PI ? 1 : 0;
                const pathData = `M 0 0 L ${x1} ${y1} A 1 1 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
                
                const startX = Math.cos(midAngle);
                const startY = Math.sin(midAngle);
                const elbowRadius = 1.12; 
                const elbowX = elbowRadius * Math.cos(midAngle);
                const elbowY = elbowRadius * Math.sin(midAngle);
                // 所有項目現在都往外拉
                return { ...slice, angle, percentNum, displayPercent, isRight, pathData, startX, startY, elbowX, elbowY };
            });

            const SPACING = 0.28; // 配合字體放大，加寬防撞推擠的垂直間距
            const resolveCollisions = (slices) => {
                if (slices.length <= 1) return;
                for(let iter = 0; iter < 15; iter++) {
                    for (let i = 1; i < slices.length; i++) {
                        const diff = slices[i].elbowY - slices[i-1].elbowY;
                        if (diff < SPACING) {
                            const adjust = (SPACING - diff) / 2;
                            slices[i-1].elbowY -= adjust;
                            slices[i].elbowY += adjust;
                        }
                    }
                }
            };
            const rightSlices = slicesData.filter(s => s.isRight).sort((a, b) => a.elbowY - b.elbowY);
            const leftSlices = slicesData.filter(s => !s.isRight).sort((a, b) => a.elbowY - b.elbowY);
            resolveCollisions(rightSlices);
            resolveCollisions(leftSlices);

            return (
                <div className="flex flex-col items-center w-full">
                    <div className="w-full max-w-[500px] relative flex justify-center">
                        {/* 稍微加寬 viewBox (從 5.8 改為 6.2) 並微調，以容納變大後的字體，保證不被切斷 */}
                        <svg viewBox="-3.1 -1.25 6.2 2.5" className="w-full h-auto drop-shadow-md overflow-visible" style={{ maxHeight: '340px' }} onMouseLeave={handleMouseLeave}>
                            
                            {/* 第一層：畫所有的彩色扇形 */}
                            {slicesData.map((slice, i) => {
                                if (slice.value === total) {
                                    return (
                                        <circle key={`slice-${i}`} cx="0" cy="0" r="1" fill={slice.color} className="transition-all duration-300 hover:opacity-80 cursor-pointer" onMouseMove={(e) => handleMouseMove(e, slice, slice.displayPercent)} />
                                    );
                                }
                                return (
                                    <path key={`slice-${i}`} d={slice.pathData} fill={slice.color} stroke="#ffffff" strokeWidth="0.02" className="transition-all duration-300 hover:opacity-80 cursor-pointer" onMouseMove={(e) => handleMouseMove(e, slice, slice.displayPercent)} />
                                );
                            })}

                            {/* 第二層：畫中心白圈 */}
                            <circle cx="0" cy="0" r="0.65" fill="#ffffff" className="pointer-events-none" />

                            {/* 第三層：所有內容用引線拉出 */}
                            {slicesData.map((slice, i) => {
                                if (slice.value === total) {
                                    return (
                                        <text key={`text-${i}`} textAnchor="middle" fill="#475569" fontSize="0.28" fontWeight="900" className="pointer-events-none">
                                            <tspan x="0" y="-0.12">{slice.name}</tspan>
                                            <tspan x="0" y="0.18">{slice.displayPercent}</tspan>
                                        </text>
                                    );
                                }
                                const lineExt = slice.isRight ? 0.2 : -0.2; 
                                const endX = slice.elbowX + lineExt;
                                const textXOutside = endX + (slice.isRight ? 0.05 : -0.05);
                                return (
                                    <g key={`text-${i}`} className="pointer-events-none">
                                        <polyline points={`${slice.startX},${slice.startY} ${slice.elbowX},${slice.elbowY} ${endX},${slice.elbowY}`} fill="none" stroke={slice.color} strokeWidth="0.02" />
                                        {/* 外部引線字體再度放大 */}
                                        <text x={textXOutside} y={slice.elbowY} textAnchor={slice.isRight ? "start" : "end"} dominantBaseline="central" fill="#475569" fontSize="0.20" fontWeight="bold">
                                            {slice.name} {slice.displayPercent}
                                        </text>
                                    </g>
                                );
                            })}
                            
                            {/* 第四層：中心總支出文字，同步再放大 */}
                            <text textAnchor="middle" dominantBaseline="central" className="pointer-events-none">
                                <tspan x="0" y="-0.14" fill="#94a3b8" fontSize="0.16" fontWeight="700">總支出</tspan>
                                <tspan x="0" y="0.18" fill="#1e293b" fontSize="0.28" fontWeight="900">${total.toLocaleString()}</tspan>
                            </text>
                        </svg>
                    </div>
                    {tooltip.show && (
                        <div className="fixed z-[100] pointer-events-none bg-slate-800 text-white text-base px-4 py-3 rounded-lg shadow-xl transform -translate-x-1/2 -translate-y-[130%] animate-in fade-in zoom-in duration-200" style={{ left: tooltip.x, top: tooltip.y }}>
                            <div className="flex flex-col items-center">
                                <span className="font-bold">{tooltip.name} ({tooltip.percent})</span>
                                <span className="text-emerald-400 font-bold mt-1">${tooltip.value.toLocaleString()}</span>
                            </div>
                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主程式 App ---
        const App = () => {
            const getToday = () => new Date().toISOString().split('T')[0];
            const getCurrentMonth = () => new Date().toISOString().slice(0, 7); 
            const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Pl_vJN-8U7uitudmdrU9ow4vhXE6E3AD21ylZfQ0Cbub991GdzNo1uen4RGngerK/exec';

            const [activeTab, setActiveTab] = useState('input');
            const [transactionMode, setTransactionMode] = useState('expense'); 
            const [incomeMode, setIncomeMode] = useState('monthly_fee'); 
            const [scriptUrl, setScriptUrl] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [expenseData, setExpenseData] = useState({ date: getToday(), spender: '', item: '', category: '', amount: '', note: '' });
            const [incomeData, setIncomeData] = useState({ month: getCurrentMonth(), monthlyFee: 15000, adjMonth: getCurrentMonth(), adjType: 'add', adjAmount: '', adjNote: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null);
            const [formError, setFormError] = useState('');
            
            const [editingRecord, setEditingRecord] = useState(null);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const [records, setRecords] = useState([]);
            const [isLoadingRecords, setIsLoadingRecords] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [selectedMonth, setSelectedMonth] = useState(getCurrentMonth());
            const [analysisStartMonth, setAnalysisStartMonth] = useState(getCurrentMonth());
            const [analysisEndMonth, setAnalysisEndMonth] = useState(getCurrentMonth());
            const [listFilter, setListFilter] = useState('全部收支');

            const spenders = ['咻咻', '伶伶'];
            const categories = [
                { id: 'food', label: '餐食', icon: '🍔', color: '#F59E0B' },
                { id: 'home', label: '生活採買', icon: '🛒', color: '#10B981' },
                { id: 'bills', label: '居住與繳費', icon: '📄', color: '#64748B' },
                { id: 'transport', label: '交通', icon: '🚌', color: '#3B82F6' },
                { id: 'entertainment', label: '娛樂', icon: '🎬', color: '#EC4899' },
                { id: 'others', label: '其他', icon: '✨', color: '#94A3B8' }
            ];
            const listFilterOptions = ['全部收支', '餐食', '生活採買', '居住與繳費', '交通', '娛樂', '其他', '月費', '系統調整'];

            const getCategoryColor = (label) => {
                const cat = categories.find(c => c.label === label);
                return cat ? cat.color : '#cbd5e1';
            };

            useEffect(() => {
                const savedUrl = localStorage.getItem('googleScriptUrl');
                if (savedUrl) setScriptUrl(savedUrl);
                else {
                    setScriptUrl(DEFAULT_SCRIPT_URL);
                    localStorage.setItem('googleScriptUrl', DEFAULT_SCRIPT_URL);
                }
            }, []);

            useEffect(() => {
                if (scriptUrl && scriptUrl.includes('script.google.com')) fetchRecords();
            }, [scriptUrl]);

            const fetchRecords = async () => {
                if (!scriptUrl) return;
                setIsLoadingRecords(true);
                setSyncError('');
                try {
                    const response = await fetch(`${scriptUrl}?action=getRecords`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        const mapped = result.data.map(r => {
                            let exp = Number(r.expenseAmount) || 0;
                            let inc = Number(r.incomeAmount) || 0;
                            let amt = inc > 0 ? inc : -exp;
                            return { ...r, parsedAmount: amt };
                        });
                        mapped.sort((a, b) => {
                            if (a.date !== b.date) return a.date.localeCompare(b.date);
                            return new Date(a.timestamp) - new Date(b.timestamp);
                        });
                        let runningBalance = 0;
                        const withBalance = mapped.map(r => {
                            runningBalance += r.parsedAmount;
                            return { ...r, computedBalance: runningBalance };
                        });
                        setRecords(withBalance.reverse());
                    }
                } catch (e) { setSyncError('連線失敗'); }
                setIsLoadingRecords(false);
            };

            const currentBalance = records.length > 0 ? records[0].computedBalance : 0;

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!expenseData.spender && transactionMode === 'expense') { setFormError('請選擇填表人'); return; }
                setIsSubmitting(true);
                setFormError('');
                try {
                    let payload;
                    if (transactionMode === 'expense') {
                        payload = { action: 'addRecord', date: expenseData.date, spender: expenseData.spender, item: expenseData.item, category: expenseData.category, expenseAmount: Number(expenseData.amount), incomeAmount: "", note: expenseData.note };
                    } else if (incomeMode === 'monthly_fee') {
                        const feeItem = `${incomeData.month} 月費`;
                        const alreadyExists = records.some(r => r.item === feeItem);
                        if (alreadyExists) {
                            setFormError(`該月份 (${incomeData.month}) 已有月費紀錄，不可重複輸入！`);
                            setIsSubmitting(false);
                            return;
                        }
                        
                        const firstDay = `${incomeData.month}-01`;
                        await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addRecord', date: firstDay, spender: '咻咻', item: feeItem, category: '', expenseAmount: "", incomeAmount: Number(incomeData.monthlyFee), note: '' }) });
                        payload = { action: 'addRecord', date: firstDay, spender: '伶伶', item: feeItem, category: '', expenseAmount: "", incomeAmount: Number(incomeData.monthlyFee), note: '' };
                    } else {
                        const amt = Number(incomeData.adjAmount);
                        const adjDateString = `${incomeData.adjMonth}-01`;
                        payload = { action: 'addRecord', date: adjDateString, spender: '銀行', item: incomeData.adjItem, category: '系統調整', expenseAmount: incomeData.adjType === 'sub' ? amt : "", incomeAmount: incomeData.adjType === 'add' ? amt : "", note: incomeData.adjNote };
                    }
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setSubmitStatus('success');
                    setExpenseData({ ...expenseData, item: '', amount: '', note: '' });
                    fetchRecords();
                    setTimeout(() => setSubmitStatus(null), 3000);
                } catch (err) { setFormError('儲存失敗'); }
                setIsSubmitting(false);
            };

            const openEditModal = (record) => {
                setEditingRecord({
                    ...record,
                    editAmount: Math.abs(record.parsedAmount)
                });
                setShowDeleteConfirm(false);
            };

            const handleEditChange = (e) => {
                const { name, value } = e.target;
                setEditingRecord(prev => ({ ...prev, [name]: value }));
            };

            const handleEditSubmit = async () => {
                if (!editingRecord.item || !editingRecord.editAmount) return; 
                setIsSubmitting(true);
                const isIncome = editingRecord.parsedAmount > 0;
                const finalAmount = Number(editingRecord.editAmount);
                
                const payload = {
                    action: 'editRecord',
                    timestamp: editingRecord.timestamp,
                    date: editingRecord.date,
                    spender: editingRecord.spender,
                    item: editingRecord.item,
                    category: editingRecord.category || '',
                    expenseAmount: isIncome ? "" : finalAmount,
                    incomeAmount: isIncome ? finalAmount : "",
                    note: editingRecord.note || ''
                };

                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setEditingRecord(null);
                    fetchRecords();
                    setSubmitStatus('success');
                    setTimeout(() => setSubmitStatus(null), 3000);
                } catch (error) {
                    console.error(error);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleDeleteSubmit = async () => {
                setIsSubmitting(true);
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteRecord', timestamp: editingRecord.timestamp }) });
                    setEditingRecord(null);
                    setShowDeleteConfirm(false);
                    fetchRecords();
                    setSubmitStatus('success');
                    setTimeout(() => setSubmitStatus(null), 3000);
                } catch (error) {
                    console.error(error);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const currentMonthRecords = records.filter(r => r.date && r.date.startsWith(selectedMonth));
            let xiuxiuPaid = 0, linglingPaid = 0, totalExp = 0, xiuxiuFee = 0, linglingFee = 0;
            currentMonthRecords.forEach(r => {
                const amt = r.parsedAmount;
                if (amt > 0 && r.item.includes('月費')) {
                    if (r.spender === '咻咻') xiuxiuFee += amt;
                    else if (r.spender === '伶伶') linglingFee += amt;
                } else if (amt < 0 && r.category !== '系統調整') {
                    const abs = Math.abs(amt);
                    totalExp += abs;
                    if (r.spender === '咻咻') xiuxiuPaid += abs;
                    else if (r.spender === '伶伶') linglingPaid += abs;
                }
            });

            const baseRecords = records.filter(r => r.date >= analysisStartMonth + '-01' && r.date <= analysisEndMonth + '-31');
            const catSums = {};
            baseRecords.forEach(r => {
                if (r.parsedAmount < 0 && r.category !== '系統調整') catSums[r.category] = (catSums[r.category] || 0) + Math.abs(r.parsedAmount);
            });
            const pieData = Object.entries(catSums).map(([name, value]) => ({ name, value, color: getCategoryColor(name) })).sort((a,b) => b.value - a.value);
            
            // --- 提取資料庫中所有的「年-月」組合給選擇器使用 ---
            const availableYearMonths = useMemo(() => {
                const s = new Set([getCurrentMonth()]); // 始終保留當前月份
                records.forEach(r => {
                    if (r.date && r.date.length >= 7) {
                        s.add(r.date.substring(0, 7)); // 抓取 "YYYY-MM"
                    }
                });
                return Array.from(s).sort((a, b) => b.localeCompare(a)); 
            }, [records]);

            const filtered = baseRecords.filter(r => listFilter === '全部收支' ? true : (listFilter === '月費' ? (r.item && r.item.includes('月費')) : r.category === listFilter));

            const getStatusText = (fee, paid) => {
                const diff = fee - paid;
                if (diff > 0) return { isTargetMet: false, label: '匯給帳戶', amount: `$${diff.toLocaleString()}`, color: 'text-red-600' };
                if (diff < 0) return { isTargetMet: false, label: '帳戶提撥', amount: `$${Math.abs(diff).toLocaleString()}`, color: 'text-emerald-600' };
                return { isTargetMet: true, text: '✅ 已達標', color: 'text-emerald-600' };
            };
            const xStatus = getStatusText(xiuxiuFee, xiuxiuPaid);
            const lStatus = getStatusText(linglingFee, linglingPaid);

            const renderStatus = (status) => {
                if (status.isTargetMet) {
                    return <p className={`text-xl font-black mt-4 pt-3 border-t border-slate-200/60 ${status.color}`}>{status.text}</p>;
                }
                return (
                    <div className={`mt-4 pt-3 border-t border-slate-200/60 flex flex-col gap-1 ${status.color}`}>
                        <p className="text-sm font-bold opacity-80">{status.label}</p>
                        <p className="text-2xl font-black">{status.amount}</p>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 flex justify-center pb-24">
                    <div className="w-full max-w-md bg-white shadow-xl flex flex-col min-h-screen relative">
                        <header className="bg-blue-600 text-white p-6 sticky top-0 z-20 flex justify-between items-center shadow-md">
                            <div className="flex items-center gap-3"><Icon name="Wallet" size={32} /><h1 className="text-3xl font-bold tracking-tight">咻伶伶小財庫</h1></div>
                            <button onClick={() => setShowSettings(!showSettings)} className="text-sm font-bold bg-blue-700/50 hover:bg-blue-700 px-4 py-2 rounded-full border border-blue-400/30">⚙️ 設定</button>
                        </header>

                        {showSettings && (
                            <div className="p-5 bg-blue-50 border-b border-blue-100">
                                <label className="text-base font-bold text-slate-600">Google Script API 網址</label>
                                <input type="text" value={scriptUrl} onChange={(e) => setScriptUrl(e.target.value)} className="w-full p-4 mt-2 rounded-lg border border-slate-300 text-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://script.google.com/..." />
                                <button onClick={() => { localStorage.setItem('googleScriptUrl', scriptUrl); setShowSettings(false); }} className="w-full mt-4 bg-blue-600 text-white py-4 rounded-lg font-bold text-lg shadow-md">儲存並關閉</button>
                            </div>
                        )}

                        {activeTab === 'input' ? (
                            <main className="p-6 space-y-7 flex-1 overflow-y-auto">
                                <div className="flex bg-slate-100 p-2 rounded-xl">
                                    <button onClick={() => setTransactionMode('expense')} className={`flex-1 py-4 rounded-lg text-lg font-bold transition-all ${transactionMode === 'expense' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>支出記帳</button>
                                    <button onClick={() => setTransactionMode('income')} className={`flex-1 py-4 rounded-lg text-lg font-bold transition-all ${transactionMode === 'income' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>收入調整</button>
                                </div>
                                {transactionMode === 'expense' ? (
                                    <div className="space-y-6">
                                        <section><label className="text-lg font-bold text-slate-700 flex gap-2 items-center mb-2.5"><Icon name="Calendar" size={20} className="text-blue-500"/>消費日期</label><input type="date" value={expenseData.date} onChange={e => setExpenseData({...expenseData, date: e.target.value})} className="w-full p-5 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-lg"/></section>
                                        <section><label className="text-lg font-bold text-slate-700 flex gap-2 items-center mb-2.5"><Icon name="User" size={20} className="text-blue-500"/>填表人</label><div className="grid grid-cols-2 gap-4">{spenders.map(s => <button key={s} onClick={()=>setExpenseData({...expenseData, spender: s})} className={`py-5 rounded-xl border text-lg font-bold transition-all ${expenseData.spender === s ? 'bg-blue-600 text-white border-blue-600 shadow-lg scale-[1.02]' : 'bg-white text-slate-500 border-slate-200'}`}>{s}</button>)}</div></section>
                                        <section><label className="text-lg font-bold text-slate-700 flex gap-2 items-center mb-2.5"><Icon name="ShoppingCart" size={20} className="text-blue-500"/>支出項目</label><input type="text" value={expenseData.item} onChange={e => setExpenseData({...expenseData, item: e.target.value})} className="w-full p-5 bg-slate-50 rounded-xl border border-slate-200 text-lg outline-none focus:ring-2 focus:ring-blue-500"/></section>
                                        <section><label className="text-lg font-bold text-slate-700 flex gap-2 items-center mb-2.5"><Icon name="Tags" size={20} className="text-blue-500"/>支出類型</label>
                                            <div className="grid grid-cols-3 gap-3">
                                                {categories.map(c => <button key={c.id} onClick={()=>setExpenseData({...expenseData, category: c.label})} className={`p-4 rounded-xl border flex flex-col items-center gap-2 ${expenseData.category === c.label ? 'bg-emerald-50 border-emerald-500 text-emerald-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200'}`}><span className="text-3xl">{c.icon}</span><span className="text-base font-black mt-1">{c.label}</span></button>)}
                                            </div>
                                        </section>
                                        <div className="grid grid-cols-2 gap-5">
                                            <section><label className="text-lg font-bold text-red-500 mb-2.5 block">支出金額</label>
                                                <div className="relative">
                                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                                    <input type="number" value={expenseData.amount} onChange={e => setExpenseData({...expenseData, amount: e.target.value})} onWheel={(e) => e.target.blur()} className="w-full p-5 pl-10 bg-slate-50 rounded-xl border border-slate-200 text-3xl font-black outline-none focus:ring-2 focus:ring-red-500"/>
                                                </div>
                                            </section>
                                            <section><label className="text-lg font-bold text-slate-400 mb-2.5 block">帳戶餘額</label><div className="p-5 bg-slate-100 rounded-xl text-2xl font-bold text-slate-500 border border-slate-200 truncate">${currentBalance.toLocaleString()}</div></section>
                                        </div>
                                        <section><label className="text-lg font-bold text-slate-500 flex gap-2 items-center mb-2.5"><Icon name="FileText" size={20}/>備註說明 (選填)</label><input type="text" value={expenseData.note} onChange={e => setExpenseData({...expenseData, note: e.target.value})} className="w-full p-5 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-slate-400 text-lg" placeholder="可以寫點什麼..."/></section>
                                    </div>
                                ) : (
                                    <div className="space-y-7">
                                        <div className="flex gap-3 p-2 bg-slate-100 rounded-xl"><button onClick={()=>setIncomeMode('monthly_fee')} className={`flex-1 p-4 rounded-lg text-lg font-bold transition-all ${incomeMode === 'monthly_fee' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>月費入帳</button><button onClick={()=>setIncomeMode('bank_adj')} className={`flex-1 p-4 rounded-lg text-lg font-bold transition-all ${incomeMode === 'bank_adj' ? 'bg-white text-purple-600 shadow-sm' : 'text-slate-500'}`}>銀行調整</button></div>
                                        {incomeMode === 'monthly_fee' ? (
                                            <div className="space-y-6 p-7 bg-emerald-50/50 rounded-2xl border border-emerald-100 shadow-sm">
                                                <label className="text-lg font-bold text-emerald-800 block">入帳月份</label>
                                                {/* 變更為自由輸入的選擇器 */}
                                                <FreeMonthYearPicker value={incomeData.month} onChange={v => setIncomeData({...incomeData, month:v})} />
                                                <label className="text-lg font-bold text-emerald-800 block mt-4">預計匯入金額</label>
                                                <div className="relative">
                                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                                    {/* 縮小字體 text-4xl -> text-3xl */}
                                                    <input type="number" value={incomeData.monthlyFee} onChange={e => setIncomeData({...incomeData, monthlyFee: e.target.value})} onWheel={(e) => e.target.blur()} className="w-full p-6 pl-10 rounded-xl border border-emerald-200 font-black text-3xl outline-none focus:ring-2 focus:ring-emerald-500"/>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-6 p-7 bg-purple-50/50 rounded-2xl border border-purple-100 shadow-sm">
                                                <label className="text-lg font-bold text-purple-800 block">調整月份</label>
                                                {/* 變更為自由輸入的選擇器 */}
                                                <FreeMonthYearPicker value={incomeData.adjMonth} onChange={v => setIncomeData({...incomeData, adjMonth:v})} />
                                                <input type="text" placeholder="調整項目名稱" value={incomeData.adjItem} onChange={e=>setIncomeData({...incomeData, adjItem: e.target.value})} className="w-full p-5 mt-2 rounded-xl border border-purple-200 outline-none text-lg focus:ring-2 focus:ring-purple-500"/>
                                                
                                                <div className="flex gap-2 w-full">
                                                    <select value={incomeData.adjType} onChange={e=>setIncomeData({...incomeData, adjType: e.target.value})} className="p-4 border border-purple-200 rounded-xl bg-white font-bold text-purple-700 outline-none text-lg w-1/3 shrink-0">
                                                        <option value="add">➕ 增加</option>
                                                        <option value="sub">➖ 減少</option>
                                                    </select>
                                                    {/* 縮小字體 text-3xl -> text-2xl */}
                                                    <input type="number" placeholder="金額" value={incomeData.adjAmount} onChange={e=>setIncomeData({...incomeData, adjAmount: e.target.value})} onWheel={(e) => e.target.blur()} className="flex-1 min-w-0 p-4 border border-purple-200 rounded-xl font-black text-2xl outline-none focus:ring-2 focus:ring-purple-500"/>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {formError && <div className="p-5 bg-red-50 text-red-500 text-base font-bold rounded-lg flex items-center gap-3"><Icon name="AlertCircle" size={20}/>{formError}</div>}
                                <button onClick={handleSubmit} disabled={isSubmitting || isLoadingRecords} className={`w-full py-5 rounded-2xl text-white font-bold text-2xl shadow-xl transition-all flex items-center justify-center gap-3 ${isSubmitting || isLoadingRecords ? 'bg-slate-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-[0.98]'}`}>{isSubmitting ? <Icon name="RefreshCw" size={28} className="animate-spin"/> : <><Icon name="Send" size={28}/> 儲存至雲端</>}</button>
                            </main>
                        ) : (
                            <main className="p-4 sm:p-6 space-y-8 flex-1 bg-slate-50 overflow-y-auto custom-scrollbar">
                                <div className="bg-white p-7 rounded-2xl shadow-sm border border-slate-100 space-y-6 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-2.5 h-full bg-blue-500"></div>
                                    
                                    {/* 解決月被擋住：增加 flex-wrap 允許元素自然排版，不強制擠在同一行 */}
                                    <div className="flex flex-wrap justify-between items-center gap-2">
                                        <div className="flex items-center gap-2">
                                            <label className="font-bold text-slate-600 text-base sm:text-lg shrink-0">統計月份</label>
                                            <MonthYearPicker value={selectedMonth} onChange={setSelectedMonth} availableYearMonths={availableYearMonths}/>
                                        </div>
                                        <button onClick={fetchRecords} disabled={isLoadingRecords} className="flex items-center gap-1 sm:gap-1.5 px-3 py-2 sm:py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg text-sm font-bold transition-all active:scale-95 shadow-sm border border-blue-100 shrink-0">
                                            <Icon name="RefreshCw" size={16} className={isLoadingRecords ? "animate-spin" : ""} />
                                            <span>{isLoadingRecords ? "讀取中" : "重新整理"}</span>
                                        </button>
                                    </div>

                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-sm text-slate-500 font-bold mb-1">當月支出</p>
                                            <p className="text-4xl font-black text-slate-800 tracking-tighter">${totalExp.toLocaleString()}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm text-emerald-500 font-bold flex items-center justify-end gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span> 帳戶餘額</p>
                                            <p className="text-4xl font-black text-emerald-600 tracking-tight">${currentBalance.toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 pt-2">
                                        <div className="p-5 bg-blue-50/60 rounded-xl border border-blue-100 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <p className="text-2xl font-black text-blue-700 mb-3 flex items-center gap-1.5">👦🏻 咻咻</p>
                                                <p className="text-base text-slate-500 font-medium mb-1">當月月費: ${xiuxiuFee.toLocaleString()}</p>
                                                <p className="text-base text-slate-500 font-medium">已經支付: ${xiuxiuPaid.toLocaleString()}</p>
                                            </div>
                                            {renderStatus(xStatus)}
                                        </div>
                                        <div className="p-5 bg-purple-50/60 rounded-xl border border-purple-100 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <p className="text-2xl font-black text-purple-700 mb-3 flex items-center gap-1.5">👧🏻 伶伶</p>
                                                <p className="text-base text-slate-500 font-medium mb-1">當月月費: ${linglingFee.toLocaleString()}</p>
                                                <p className="text-base text-slate-500 font-medium">已經支付: ${linglingPaid.toLocaleString()}</p>
                                            </div>
                                            {renderStatus(lStatus)}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2.5 text-lg"><Icon name="PieChartIcon" size={24} className="text-blue-500"/>支出比例分析</h3>
                                    
                                    {/* 解決月被擋住：增加 flex-wrap 允許元素自然排版，不強制擠在同一行 */}
                                    <div className="flex flex-wrap gap-2 items-center justify-center mb-2 bg-slate-50 p-2 sm:p-3 rounded-xl border border-slate-200/50">
                                        <MonthYearPicker value={analysisStartMonth} onChange={setAnalysisStartMonth} availableYearMonths={availableYearMonths}/>
                                        <span className="text-slate-300 font-bold text-xl shrink-0">~</span>
                                        <MonthYearPicker value={analysisEndMonth} onChange={setAnalysisEndMonth} availableYearMonths={availableYearMonths}/>
                                    </div>
                                    
                                    <PieChart data={pieData} />
                                </div>

                                <div className="space-y-5">
                                    <div className="flex justify-between items-center px-1"><h3 className="font-bold text-slate-700 flex items-center gap-2.5 text-lg"><Icon name="History" size={24} className="text-blue-500"/>收支明細</h3><select value={listFilter} onChange={e=>setListFilter(e.target.value)} className="text-sm font-bold p-2.5 border border-slate-200 rounded-lg bg-white shadow-sm outline-none focus:ring-1 focus:ring-blue-500">{listFilterOptions.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                                    <div className="space-y-3">
                                        {filtered.map((r, i) => (
                                            <div key={i} className="p-3 sm:p-4 bg-white rounded-xl border border-slate-100 shadow-sm flex justify-between items-center transition-all hover:border-blue-200">
                                                <div className="flex items-center gap-3 sm:gap-4 min-w-0 flex-1">
                                                    <div className={`w-10 h-10 sm:w-11 sm:h-11 rounded-full flex items-center justify-center text-white font-black text-lg shadow-inner shrink-0 ${r.spender === '咻咻' ? 'bg-blue-400' : r.spender === '伶伶' ? 'bg-purple-400' : 'bg-slate-400'}`}>{r.spender ? r.spender[0] : '?'}</div>
                                                    <div className="min-w-0 flex flex-col gap-0.5">
                                                        <p className="font-bold text-slate-800 text-base sm:text-lg truncate leading-tight">{r.item}</p>
                                                        <p className="text-sm sm:text-base text-slate-500 font-medium truncate">{r.category || '收入入帳'} · {r.date}</p>
                                                        {r.note && (
                                                            <p className="text-xs sm:text-sm text-slate-400 font-medium flex items-center gap-1.5 mt-0.5 truncate">
                                                                <Icon name="FileText" size={14} className="shrink-0" /> <span className="truncate">{r.note}</span>
                                                            </p>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 shrink-0 ml-2">
                                                    <div className="text-right">
                                                        <p className={`font-black text-lg sm:text-xl tracking-tight ${r.parsedAmount > 0 ? 'text-emerald-600' : 'text-slate-700'}`}>{r.parsedAmount > 0 ? '+' : '-'}${Math.abs(r.parsedAmount).toLocaleString()}</p>
                                                        <p className="text-xs sm:text-sm text-slate-500 font-bold mt-0.5">餘: ${r.computedBalance?.toLocaleString()}</p>
                                                    </div>
                                                    <button onClick={() => openEditModal(r)} className="p-1.5 sm:p-2 ml-1 text-slate-300 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all shrink-0">
                                                        <Icon name="Edit" size={20} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </main>
                        )}

                        <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex h-20 items-center z-30 shadow-[0_-4px_25px_rgba(0,0,0,0.06)]">
                            <button onClick={() => setActiveTab('input')} className={`flex-1 flex flex-col items-center justify-center gap-2 transition-all ${activeTab === 'input' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}><Icon name="Edit" size={28} color={activeTab === 'input' ? "#2563eb" : "#94a3b8"}/><span className="text-sm font-black">開始記帳</span></button>
                            <button onClick={() => setActiveTab('report')} className={`flex-1 flex flex-col items-center justify-center gap-2 transition-all ${activeTab === 'report' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}><Icon name="BarChart" size={28} color={activeTab === 'report' ? "#2563eb" : "#94a3b8"}/><span className="text-sm font-black">分析明細</span></button>
                        </nav>
                        
                        {submitStatus === 'success' && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-5 rounded-full shadow-2xl z-[60] flex items-center gap-3 font-bold animate-in fade-in slide-in-from-top-4 text-lg"><Icon name="CheckCircle" size={26}/> 成功儲存！</div>
                        )}

                        {/* 修改與刪除的 Modal 視窗 */}
                        {editingRecord && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                                <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                    <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                        <h3 className="font-bold text-xl text-slate-800">修改明細</h3>
                                        <button onClick={() => setEditingRecord(null)} className="text-slate-400 hover:text-slate-600 bg-white rounded-full p-1.5 shadow-sm">
                                            <Icon name="X" size={24} />
                                        </button>
                                    </div>
                                    
                                    <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-1.5 block">日期</label>
                                            <input type="date" name="date" value={editingRecord.date} onChange={handleEditChange} className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-medium" />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-1.5 block">填表人</label>
                                            <div className="grid grid-cols-3 gap-2">
                                            {['咻咻', '伶伶', '銀行'].map(person => (
                                                <button key={person} type="button" onClick={() => setEditingRecord(prev => ({ ...prev, spender: person }))} className={`py-3 rounded-xl text-base font-bold transition-all ${editingRecord.spender === person ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100'}`}>{person}</button>
                                            ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-1.5 block">項目名稱</label>
                                                <input type="text" name="item" value={editingRecord.item} onChange={handleEditChange} className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-bold text-slate-800" />
                                            </div>
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-1.5 block">類別</label>
                                                <select name="category" value={editingRecord.category} onChange={handleEditChange} className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-bold text-slate-700">
                                                    <option value="">(無)</option>
                                                    {categories.map(cat => <option key={cat.id} value={cat.label}>{cat.label}</option>)}
                                                    <option value="家庭生活" className="hidden">家庭生活</option>
                                                    <option value="家庭繳費" className="hidden">家庭繳費</option>
                                                    <option value="系統調整">系統調整</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-1.5 block">
                                                    金額 <span className={editingRecord.parsedAmount > 0 ? "text-emerald-500" : "text-red-500"}>{editingRecord.parsedAmount > 0 ? '(收入)' : '(支出)'}</span>
                                                </label>
                                                <input type="number" name="editAmount" value={editingRecord.editAmount} onChange={handleEditChange} onWheel={(e) => e.currentTarget.blur()} className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-2xl font-black text-slate-800" />
                                            </div>
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-1.5 block">備註</label>
                                                <input type="text" name="note" value={editingRecord.note || ''} onChange={handleEditChange} className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-base" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-5 border-t border-slate-100 bg-slate-50">
                                    {showDeleteConfirm ? (
                                        <div className="flex gap-3 animate-in fade-in zoom-in duration-200">
                                            <button onClick={() => setShowDeleteConfirm(false)} className="flex-1 py-4 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors text-lg">取消</button>
                                            <button onClick={handleDeleteSubmit} disabled={isSubmitting} className="flex-1 py-4 bg-red-600 text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-red-700 transition-colors shadow-md text-lg">
                                                {isSubmitting ? <Icon name="RefreshCw" size={24} className="animate-spin" /> : '確認刪除'}
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="flex gap-3">
                                            <button onClick={() => setShowDeleteConfirm(true)} className="px-5 py-4 bg-red-100 text-red-600 rounded-xl hover:bg-red-200 transition-colors flex justify-center items-center">
                                                <Icon name="Trash" size={24} />
                                            </button>
                                            <button onClick={handleEditSubmit} disabled={isSubmitting} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/20 text-lg">
                                                {isSubmitting ? <Icon name="RefreshCw" size={24} className="animate-spin" /> : '儲存修改'}
                                            </button>
                                        </div>
                                    )}
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
